version: '3.8'

services:
  frontend:
    build:
      context: .
      dockerfile: Dockerfile
    container_name: stitch-frontend
    ports:
      - "3010:3010" # Map the Vite dev server port to the host
    volumes:
      - .:/app # Bind mount to allow hot-reloading
      - /app/node_modules # Prevent host node_modules from overriding container's
    depends_on:
      - api_backend
    networks:
      - stitch_network
    restart: unless-stopped

  api_backend:
    # Placeholder for your actual backend API container
    image: node:20-alpine
    container_name: stitch-backend
    command: sh -c "echo 'Backend API Placeholder Running...' && tail -f /dev/null"
    networks:
      - stitch_network
    restart: unless-stopped

networks:
  stitch_network:
    driver: bridge
